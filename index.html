<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jungle Keren</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <audio id="backgroundMusic" src="sounds/background.mp3" loop></audio>

    <header>
        <h1>🌿 Keren's Jungle 🌿</h1>
        <p>Click an animal or press the matching key to hear its sound</p>
    </header>

    <main class="animals-container">

        <div class="animal" data-animal="lion">
            <img src="images/lion.jpg" alt="Lion">
            <h2>Lion</h2>
            <p>Press L</p>
        </div>

        <div class="animal" data-animal="elephant">
            <img src="images/elephant.jpg" alt="Elephant">
            <h2>Elephant</h2>
            <p>Press E</p>
        </div>

        <div class="animal" data-animal="monkey">
            <img src="images/monkey.jpg" alt="Monkey">
            <h2>Monkey</h2>
            <p>Press M</p>
        </div>

        <div class="animal" data-animal="tiger">
            <img src="images/tiger.jpg" alt="Tiger">
            <h2>Tiger</h2>
            <p>Press T</p>
        </div>

        <div class="animal" data-animal="parrot">
            <img src="images/parrot.jpg" alt="Parrot">
            <h2>Parrot</h2>
            <p>Press P</p>
        </div>

        <div class="animal" data-animal="frog">
            <img src="images/frog.jpg" alt="Frog">
            <h2>Frog</h2>
            <p>Press F</p>
        </div>

        <div class="animal" data-animal="snake">
            <img src="images/snake.jpg" alt="Snake">
            <h2>Snake</h2>
            <p>Press S</p>
        </div>

    </main>

    <button id="musicButton">Stop Background Music</button>

    <script src="script.js"></script>
</body>
</html>
